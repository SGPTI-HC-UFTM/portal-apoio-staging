<ui:composition
  template="/templates/default.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:p="http://primefaces.org/ui"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
>
  <ui:define name="content">
    <h2>Calculadora do Teste do Pezinho</h2>

    <h:form id="formCalculadoraTestePezinho">
      <div class="ui-fluid formgrid grid">
        <p:fieldset>
          <f:facet name="legend">
            <i
              class="pi pi-book"
              style="margin-right: 8px; vertical-align: middle"
            ></i>
            <h:outputText
              value="Dados do Recém-Nascido"
              style="vertical-align: middle"
            />
          </f:facet>

          <div class="ui-g ui-fluid">
            <div class="field col-6">
              <p:outputLabel
                for="nomeRecemNascido"
                value="Nome do Recém-Nascido:"
              />

              <p:inputText
                id="nomeRecemNascido"
                value="#{calculadoraTestePezinhoController.calculoTestePezinho.nomeRecemNascido}"
                required="true"
                requiredMessage="Informe o nome completo do recém-nascido."
                placeholder="Nome completo"
              />
            </div>

            <div class="field col-6">
              <p:outputLabel for="nomeMae" value="Nome da Mãe:" />

              <p:inputText
                id="nomeMae"
                value="#{calculadoraTestePezinhoController.calculoTestePezinho.nomeMae}"
                required="false"
                requiredMessage="Informe o nome completo da mãe."
                placeholder="Nome completo da mãe"
              />
            </div>

            <div class="field col-6">
              <p:outputLabel for="dtNascimento" value="Data de Nascimento:" />

              <p:datePicker
                id="dtNascimento"
                size="30"
                locale="pt_BR"
                pattern="dd/MM/yyyy"
                mask="true"
                placeholder="dia / mês / ano"
                showIcon="true"
                monthNavigator="true"
                yearNavigator="true"
                value="#{calculadoraTestePezinhoController.calculoTestePezinho.dtNascimento}"
                requiredMessage="Informe a data de nascimento."
                required="true"
              />

              <h:outputText
                style="font-size: 0.75rem;color: #94A3B8;"
                value="Aceita datas dos últimos 12 meses."
              />
            </div>
          </div>
        </p:fieldset>
      </div>

      <div class="field col-2">
        <p:commandButton
          id="btnCalcularDatas"
          value="Calcular Datas"
          action="#{calculadoraTestePezinhoController.calcularDatas}"
          icon="pi pi-calendar"
        />
      </div>
    </h:form>
  </ui:define>
</ui:composition>
