<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/templates/default.xhtml" xmlns="http://www.w3.org/1999/xhtml"
				xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
				xmlns:p="http://primefaces.org/ui">
	<ui:define name="content">
		<h2>Gestão de Grupos</h2>
		
		<h:form id="formGrupos">
			<p:commandButton value="Novo" icon="pi pi-plus" process="@this" update="formDialogGrupos"
							 action="#{gruposController.openDialogGrupos}" />

			<p:dataTable id="tblGrupos" var="grupo" value="#{gruposController.grupos}" rows="10" paginator="true"
						 paginatorPosition="bottom"
						 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks}
						 	{NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
						 currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords}"
						 rowsPerPageTemplate="5,10,20" style="margin-top:10px"
						 rendered="#{not empty gruposController.grupos}">
				
            	<p:column headerText="Id" field="id" style="text-align:center; width:20%"/>
            	
            	<p:column headerText="Nome" field="grupo" filterMatchMode="contains"
						  style="text-align:center; width:60%"/>

            	<p:column headerText="Ações" style="text-align:center; width:20%">
            		<p:commandButton id="btnEditar" title="Editar" icon="pi pi-pencil" process="@this"
									 update="formDialogGrupos" action="#{gruposController.openDialogGrupos(grupo)}" />
            	</p:column>
        	</p:dataTable>
		</h:form>
		
		<ui:include src="dialog-grupos.xhtml" />
	</ui:define>
</ui:composition>
