<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
				xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
				xmlns:p="http://primefaces.org/ui">
	<p:dialog id="dlgUsuario" widgetVar="dlgUsuario"
			  header="#{acessoController.usuario.id == null ? 'Novo usuário' : 'Editar usuário'}" modal="true"
			  width="60%" height="75vh" appendTo="@(body)">
		<h:form id="formUsuario">
			<div class="ui-fluid formgrid grid">
				<div class="field col-12">
					<p:outputLabel for="login" value="Login:" />
					<p:inputText id="login" maxlength="256" value="#{acessoController.usuario.login}" />
				</div>

				<div class="field col-6">
					<p:outputLabel for="senha" value="Senha:" />
					<p:password id="senha" maxlength="256" value="#{acessoController.senha}" />
				</div>

				<div class="field col-6">
					<p:outputLabel for="confirmacao" value="Confirmação:" />
					<p:password id="confirmacao" maxlength="256" value="#{acessoController.confirmacaoSenha}" />
				</div>

				<div class="field col-12">
					<p:pickList id="grupos" value="#{acessoController.grupos}" var="grupo" itemLabel="#{grupo.grupo}"
								itemValue="#{grupo}" responsive="true" showSourceFilter="true" showTargetFilter="true"
								filterMatchMode="contains">

						<f:facet name="sourceCaption">Disponíveis</f:facet>
						<f:facet name="targetCaption">Atribuídos</f:facet>
					</p:pickList>
				</div>

				<div class="field col-2">
					<p:commandButton id="btnSalva" value="Salvar" icon="pi pi-save" update="formGestaoAcesso"
									 action="#{acessoController.salvaUsuario}" />
				</div>
			</div>
		</h:form>
	</p:dialog>
</ui:composition>
