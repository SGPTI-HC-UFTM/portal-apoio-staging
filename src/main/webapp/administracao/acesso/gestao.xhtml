<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/templates/default.xhtml" xmlns="http://www.w3.org/1999/xhtml"
				xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
				xmlns:p="http://primefaces.org/ui">
	<ui:define name="content">
		<h2>Gestão de Acesso</h2>
		
		<h:form id="formGestaoAcesso">
			<div class="ui-fluid formgrid grid">
				<div class="field col-12">
					<p:outputLabel for="login" value="Login de rede:" />
					<p:inputText id="login" maxlength="50" value="#{acessoController.loginRede}" />
				</div>

				<div class="field col-2">
					<p:commandButton id="btnPesquisa" icon="pi pi-search" value="Pesquisar" update="@form"
						action="#{acessoController.pesquisaUsuario}" />
				</div>

				<div class="field col-2">
					<p:commandButton id="btnNovo" icon="pi pi-plus" value="Novo" update="formUsuario"
					                 action="#{acessoController.openDialogNovoUsuario}" />
				</div>
			</div>
			
			<p:dataTable id="tblUsuarios"
				var="usuario" 
				value="#{acessoController.usuarios}" 
				rows="10"
                paginator="true"
                paginatorPosition="bottom"
                paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords}"
                rowsPerPageTemplate="5,10,20"
                rendered="#{not empty acessoController.usuarios}">

            	<p:column headerText="Login" 
            		field="login" 
            		style="text-align:center; width:15%"/>

            	<p:column headerText="Ações" style="text-align:center; width:10%">
            		<p:commandButton id="btnEditar"
            			title="Editar"
            			icon="pi pi-pencil"
            			process="@this"
            			update="formUsuario"
            			action="#{acessoController.openDialogUsuario(usuario)}" />
            	</p:column>
        	</p:dataTable>
		</h:form>
		
		<ui:include src="dialog-usuario.xhtml" />
	</ui:define>
</ui:composition>
