<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
				xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">

	<p:dialog id="dialogGrupos" widgetVar="dialogGrupos" header="Cadastro de Grupos" modal="true" width="60%"
			  height="600px" appendTo="@(body)">
		<h:form id="formDialogGrupos">
			<div class="ui-fluid formgrid grid">
				<div class="field col-12">
					<p:outputLabel for="nome" value="Nome:" />
					<p:inputText id="nome" maxlength="32" value="#{gruposController.grupo.grupo}" />
				</div>
				<div class="field col-3">
					<p:commandButton id="btnSalva" value="Salvar" icon="pi pi-save" update="formGrupos"
									 action="#{gruposController.salvaGrupo}" />
				</div>
			</div>
		</h:form>
	</p:dialog>
</ui:composition>
